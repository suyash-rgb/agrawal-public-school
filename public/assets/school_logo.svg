<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Top arc for AGRAWAL PUBLIC SCHOOL -->
    <!-- Center is 50,50, radius is 38. Path goes from left to right -->
    <path id="top-arc" d="M 12 50 A 38 38 0 0 1 88 50" fill="none" />
    
    <!-- Bottom arc for DHAR (M.P.) -->
    <path id="bottom-arc-text" d="M 88 50 A 38 38 0 0 1 12 50" fill="none" />
  </defs>

  <!-- Outer gold/yellow thin ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#d4af37" stroke-width="1.5" />
  
  <!-- Main red ring -->
  <circle cx="50" cy="50" r="46.5" fill="#a81c24" />
  
  <!-- Inner gold/yellow thin ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#d4af37" stroke-width="1.5" />
  
  <!-- Inner white circle -->
  <circle cx="50" cy="50" r="28.5" fill="#ffffff" />
  
  <!-- Lotus Flower (Pink with dark outline) -->
  <g stroke="#701a75" stroke-width="0.75">
    <!-- Back outer petals -->
    <path d="M 50 65 C 20 65, 15 45, 20 38 C 25 50, 40 50, 50 65 Z" fill="#fce7f3" />
    <path d="M 50 65 C 80 65, 85 45, 80 38 C 75 50, 60 50, 50 65 Z" fill="#fce7f3" />
    <!-- Left inner petal -->
    <path d="M 50 65 C 30 60, 25 40, 28 30 C 35 45, 45 45, 50 65 Z" fill="#fbcfe8" />
    <!-- Right inner petal -->
    <path d="M 50 65 C 70 60, 75 40, 72 30 C 65 45, 55 45, 50 65 Z" fill="#fbcfe8" />
    <!-- Center petal -->
    <path d="M 50 20 C 62 35, 60 55, 50 65 C 40 55, 38 35, 50 20 Z" fill="#f9a8d4" />
  </g>
  
  <!-- Open Book (White with dark outline) -->
  <g stroke="#333" stroke-width="0.75" fill="#ffffff">
    <!-- Left page -->
    <path d="M 50 60 C 40 64, 25 60, 25 50 L 25 40 C 28 50, 40 54, 50 50 Z" />
    <!-- Right page -->
    <path d="M 50 60 C 60 64, 75 60, 75 50 L 75 40 C 72 50, 60 54, 50 50 Z" />
    <!-- Center line -->
    <line x1="50" y1="40" x2="50" y2="60" />
    <!-- Page text lines left -->
    <line x1="30" y1="45" x2="45" y2="47" stroke-width="0.4" />
    <line x1="30" y1="48" x2="45" y2="50" stroke-width="0.4" />
    <!-- Page text lines right -->
    <line x1="70" y1="45" x2="55" y2="47" stroke-width="0.4" />
    <line x1="70" y1="48" x2="55" y2="50" stroke-width="0.4" />
  </g>
  
  <!-- Oil Lamp (Diya) on Stand -->
  <g>
    <!-- Stand base -->
    <path d="M 42 75 L 58 75 L 54 70 L 46 70 Z" fill="#d4af37" stroke="#b45309" stroke-width="0.5" />
    <!-- Stand stem -->
    <rect x="49" y="58" width="2" height="12" fill="#d4af37" stroke="#b45309" stroke-width="0.5" />
    <circle cx="50" cy="65" r="2" fill="#d4af37" stroke="#b45309" stroke-width="0.5" />
    <!-- Lamp bowl -->
    <path d="M 38 58 C 38 65, 62 65, 62 58 Z" fill="#fcd34d" stroke="#b45309" stroke-width="0.5" />
    <!-- Flame -->
    <path d="M 50 58 C 53 54, 53 48, 50 42 C 47 48, 47 54, 50 58 Z" fill="#f97316" />
    <path d="M 50 56 C 51.5 53, 51.5 49, 50 45 C 48.5 49, 48.5 53, 50 56 Z" fill="#fef08a" />
  </g>
  
  <!-- Outer Text: AGRAWAL PUBLIC SCHOOL -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="0.5">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">AGRAWAL PUBLIC SCHOOL</textPath>
  </text>
  
  <!-- Outer Text: DHAR (M.P.) -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="1">
    <textPath href="#bottom-arc-text" startOffset="50%" text-anchor="middle">DHAR (M.P.)</textPath>
  </text>
  
  <!-- Three dots separators -->
  <circle cx="12" cy="50" r="1.5" fill="#ffffff" />
  <circle cx="15.5" cy="46" r="1.5" fill="#ffffff" />
  <circle cx="15.5" cy="54" r="1.5" fill="#ffffff" />
  
  <circle cx="88" cy="50" r="1.5" fill="#ffffff" />
  <circle cx="84.5" cy="46" r="1.5" fill="#ffffff" />
  <circle cx="84.5" cy="54" r="1.5" fill="#ffffff" />
</svg>
